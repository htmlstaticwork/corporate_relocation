<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <clipPath id="circle"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="200" height="200" fill="url(#bg)"/>
    <!-- Grid -->
    <g opacity="0.05" stroke="#10b981" stroke-width="0.5">
      <line x1="0" y1="20" x2="200" y2="20"/><line x1="0" y1="40" x2="200" y2="40"/>
      <line x1="0" y1="60" x2="200" y2="60"/><line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="100" x2="200" y2="100"/><line x1="0" y1="120" x2="200" y2="120"/>
      <line x1="0" y1="140" x2="200" y2="140"/><line x1="0" y1="160" x2="200" y2="160"/>
      <line x1="0" y1="180" x2="200" y2="180"/>
      <line x1="20" y1="0" x2="20" y2="200"/><line x1="40" y1="0" x2="40" y2="200"/>
      <line x1="60" y1="0" x2="60" y2="200"/><line x1="80" y1="0" x2="80" y2="200"/>
      <line x1="100" y1="0" x2="100" y2="200"/><line x1="120" y1="0" x2="120" y2="200"/>
      <line x1="140" y1="0" x2="140" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
      <line x1="180" y1="0" x2="180" y2="200"/>
    </g>
    <!-- Head -->
    <circle cx="100" cy="78" r="36" fill="#1e293b" stroke="#10b981" stroke-opacity="0.3" stroke-width="2"/>
    <!-- Face features -->
    <circle cx="86" cy="72" r="3" fill="#10b981" opacity="0.5"/>
    <circle cx="114" cy="72" r="3" fill="#10b981" opacity="0.5"/>
    <line x1="92" y1="88" x2="108" y2="88" stroke="#10b981" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>
    <!-- Body/Shoulders -->
    <ellipse cx="100" cy="175" rx="65" ry="55" fill="#1e293b" stroke="#10b981" stroke-opacity="0.3" stroke-width="2"/>
    <!-- Tie -->
    <polygon points="100,120 94,145 100,170 106,145" fill="#10b981" opacity="0.25"/>
    <!-- Collar -->
    <line x1="80" y1="125" x2="100" y2="135" stroke="#10b981" stroke-opacity="0.2" stroke-width="2"/>
    <line x1="120" y1="125" x2="100" y2="135" stroke="#10b981" stroke-opacity="0.2" stroke-width="2"/>
    <!-- Emerald glow -->
    <circle cx="100" cy="100" r="90" fill="none" stroke="#10b981" stroke-opacity="0.08" stroke-width="1"/>
  </g>
  <circle cx="100" cy="100" r="99" fill="none" stroke="#10b981" stroke-opacity="0.2" stroke-width="2"/>
</svg>
