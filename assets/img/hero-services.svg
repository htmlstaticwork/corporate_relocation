<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#01120a;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad)" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  <circle cx="960" cy="540" r="400" fill="#10b981" fill-opacity="0.05">
    <animate attributeName="r" values="380;420;380" dur="10s" repeatCount="indefinite" />
  </circle>
  <g opacity="0.2">
    <circle cx="200" cy="200" r="2" fill="#10b981" />
    <circle cx="1700" cy="800" r="3" fill="#10b981" />
    <circle cx="400" cy="900" r="1.5" fill="#10b981" />
    <circle cx="1500" cy="150" r="2" fill="#10b981" />
  </g>
</svg>
