<!DOCTYPE html>
<html lang="en" data-bs-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | CorpMove</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Bootstrap 5 & Custom CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
<body class="bg-primary text-white d-flex flex-column min-vh-100" style="background-image: linear-gradient(135deg, var(--cm-primary) 0%, rgba(30, 58, 138, 0.8) 100%);">

    <header class="py-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="text-white fw-bold fs-3 text-decoration-none d-flex align-items-center" href="index.html">
                <i class="bi bi-buildings-fill text-secondary me-2 fs-2"></i> CorpMove
            </a>
            <button class="theme-toggle text-white d-none" id="themeToggle" aria-label="Toggle Theme"><i class="bi bi-moon-fill" id="themeIcon"></i></button>
        </div>
    </header>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center text-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7">
                    <!-- Icon -->
                    <div class="d-inline-flex justify-content-center align-items-center bg-white bg-opacity-10 rounded-circle text-secondary mb-4 p-4 shadow-sm" style="width:100px; height:100px;">
                        <i class="bi bi-tools fs-1"></i>
                    </div>
                    
                    <h6 class="text-secondary fw-bold text-uppercase tracking-wider mb-3">Under Maintenance</h6>
                    <h1 class="display-3 fw-bold mb-4">We're updating our systems</h1>
                    <p class="lead opacity-75 mb-5 mx-auto" style="max-width: 500px;">Our corporate HR dashboards and relocation tracking tools are currently down for scheduled maintenance. We'll be back online shortly to continue moving your teams safely.</p>
                    
                    <div class="cm-card p-4 mx-auto bg-white bg-opacity-10 border border-white border-opacity-25" style="max-width: 450px;">
                        <h6 class="fw-medium mb-3">Notify me when we're back</h6>
                        <form class="d-flex w-100">
                            <input type="email" class="form-control rounded-start-pill border-0 shadow-none ps-4 bg-white" placeholder="Email Address" required>
                            <button class="btn btn-secondary rounded-end-pill px-4 fw-bold shadow-sm" type="submit">Notify</button>
                        </form>
                    </div>

                    <div class="mt-5 pt-4 d-flex justify-content-center gap-4">
                        <a href="#" class="text-white opacity-50 hover-opacity fs-4"><i class="bi bi-envelope"></i></a>
                        <a href="#" class="text-white opacity-50 hover-opacity fs-4"><i class="bi bi-linkedin"></i></a>
                        <a href="#" class="text-white opacity-50 hover-opacity fs-4"><i class="bi bi-twitter-x"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-4 text-center">
        <p class="mb-0 text-white opacity-50 small">&copy; 2026 CorpMove. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
