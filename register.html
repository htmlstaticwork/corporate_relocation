<!DOCTYPE html>
<html lang="en" data-bs-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new account at CorpMove.">
    <title>Register | CorpMove</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1e21; /* Dark background as seen in screenshot */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .register-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 50px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            margin: 40px 0;
        }
        [data-bs-theme="dark"] .register-card {
            background: #1f2937;
        }
        .card-toggles {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .toggle-btn:hover {
            background: #e5e7eb;
            transform: scale(1.1);
        }
        [data-bs-theme="dark"] .toggle-btn:hover {
            background: #4b5563;
        }
        [data-bs-theme="dark"] .toggle-btn {
            background: #374151;
            color: #f9fafb;
        }
        /* Removed custom brand-logo styles to use standard navbar branding */
        .register-title {
            text-align: center;
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 5px;
            color: #111827;
        }
        [data-bs-theme="dark"] .register-title {
            color: #fff;
        }
        .register-subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #374151;
            margin-bottom: 8px;
        }
        [data-bs-theme="dark"] .form-label {
            color: #d1d5db;
        }
        .form-control {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 0.9rem;
        }
        [data-bs-theme="dark"] .form-control {
            background-color: #374151;
            border-color: #4b5563;
            color: #fff;
        }
        .form-check-label {
            font-size: 0.85rem;
            color: #6b7280;
        }
        .btn-register {
            background-color: #153e34;
            color: #fff;
            font-weight: 700;
            border-radius: 30px;
            padding: 12px;
            width: 100%;
            border: none;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            background-color: #0d2922;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        [data-bs-theme="dark"] .btn-register:hover {
            background-color: #059669;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: #9ca3af;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
        [data-bs-theme="dark"] .divider::before,
        [data-bs-theme="dark"] .divider::after { border-color: #4b5563; }
        
        .social-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .social-btn:hover {
            background: #f9fafb;
            border-color: #153e34;
            color: #153e34;
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        [data-bs-theme="dark"] .social-btn:hover {
            background: #4b5563;
            border-color: #10b981;
            color: #10b981;
        }
        .login-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            color: #6b7280;
        }
        .login-link {
            color: #153e34;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .login-link:hover {
            text-decoration: underline;
            color: #1a4f43;
        }
        [data-bs-theme="dark"] .login-link:hover {
            color: #34d399;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <!-- Icons inside Card -->
        <div class="card-toggles">
            <button class="toggle-btn" id="themeToggle" title="Toggle Theme">
                <i class="bi bi-moon-fill" id="themeIcon"></i>
            </button>
            <button class="toggle-btn" id="rtlToggle" title="Toggle RTL" style="font-weight: 700; font-size: 0.7rem;">
                RTL
            </button>
        </div>

        <a href="index.html" class="navbar-brand text-primary fw-bold fs-3 d-flex align-items-center justify-content-center mb-4 text-decoration-none">
            <i class="bi bi-buildings-fill me-2 fs-2"></i> CorpMove
        </a>

        <h2 class="register-title">Create Account</h2>
        <p class="register-subtitle">Join our community of professionals.</p>

        <form action="dashboard.html">
            <div class="mb-3 text-start">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
            </div>
            <div class="mb-3 text-start">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
            </div>
            <div class="mb-3 text-start">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Create a password" required>
            </div>
            <div class="mb-3 text-start">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            
            <div class="form-check mb-4 text-start">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label" for="terms">I agree to the <a href="#" class="login-link">Terms and Privacy</a></label>
            </div>

            <button type="submit" class="btn btn-register">Create Account</button>
        </form>

        <div class="divider">Or sign up with</div>

        <div class="social-btns">
            <a href="#" class="social-btn"><i class="bi bi-google"></i></a>
            <a href="#" class="social-btn"><i class="bi bi-apple"></i></a>
            <a href="#" class="social-btn"><i class="bi bi-facebook"></i></a>
        </div>

        <p class="login-text">Already have an account? <a href="login.html" class="login-link">Login</a></p>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
