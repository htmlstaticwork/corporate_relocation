<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure Access Node. Identify yourself for corporate transition management.">
    <title>Login | CorpMove</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <style>
        body {
            background-color: var(--cm-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto;
            transition: background-color 0.3s ease;
        }
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .auth-card {
            background: var(--cm-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--cm-border);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--bs-primary), transparent);
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .form-control {
            background: var(--cm-bg);
            border: 1px solid var(--cm-border);
            border-radius: 12px;
            padding: 14px 20px;
            color: var(--cm-text-body);
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: var(--cm-bg);
            border-color: var(--bs-primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .tech-label {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.7rem;
            color: var(--bs-primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            display: block;
        }
        .btn-auth {
            background: var(--bs-primary);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .btn-auth:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        /* FIX #18: Social media hover */
        .social-login a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 1px solid var(--cm-border);
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }
        .social-login a:hover {
            color: var(--cm-primary) !important;
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--cm-primary);
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2);
        }
        /* FIX #18: Key Recovery and Enroll Now hover */
        .auth-link {
            transition: all 0.3s ease !important;
        }
        .auth-link:hover {
            color: #059669 !important;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <!-- Theme and RTL Buttons placed outside the container -->
    <div class="position-fixed top-0 end-0 p-4 d-flex gap-2" style="z-index: 1050;">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme">
            <i class="bi bi-moon-fill" id="themeIcon"></i>
        </button>
        <button class="rtl-toggle-btn" id="rtlToggle" aria-label="Toggle RTL Direction">
            <span style="font-size: 0.7rem; font-weight: 700;">RTL</span>
        </button>
    </div>

    <div class="login-container reveal">
        <div class="auth-card position-relative">
            <div class="text-center mb-5">
                <a href="index.html" class="navbar-brand text-primary fw-bold fs-3 d-flex align-items-center justify-content-center mb-4 text-decoration-none">
                    <i class="bi bi-buildings-fill me-2 fs-2"></i> CorpMove
                </a>
                <h2 class="cm-text-heading fw-bold mb-2">Welcome Back</h2>
                <p class="text-muted small">Please enter your credentials to access your account.</p>
            </div>

            <form action="index.html">
                <div class="mb-4">
                    <label class="tech-label">Email ID</label>
                    <input type="email" class="form-control shadow-none" placeholder="Enter your email" required>
                </div>
                <div class="mb-4">
                    <label class="tech-label">Password</label>
                    <input type="password" class="form-control shadow-none" placeholder="••••••••" required>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div class="form-check">
                        <input class="form-check-input shadow-none" type="checkbox" id="remember">
                        <label class="form-check-label text-muted" for="remember" style="font-size: 0.75rem;">Remember Password</label>
                    </div>
                    <a href="#" class="text-primary text-decoration-none fw-bold auth-link transition-all hover-scale text-nowrap" style="font-size: 0.75rem;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-auth w-100 text-white transition-all hover-scale">Login</button>
            </form>

            <!-- FIX #18: Social media buttons with hover -->
            <div class="mt-4 text-center">
                 <p class="text-muted mb-3" style="font-size: 0.65rem;">OR AUTHENTICATE VIA</p>
                 <div class="d-flex gap-3 justify-content-center social-login">
                    <a href="#" class="text-muted"><i class="bi bi-google"></i></a>
                    <a href="#" class="text-muted"><i class="bi bi-apple"></i></a>
                    <a href="#" class="text-muted"><i class="bi bi-github"></i></a>
                    <a href="#" class="text-muted"><i class="bi bi-facebook"></i></a>
                 </div>
            </div>

            <div class="text-center mt-5">
                <p class="text-muted small text-nowrap">Unregistered Entity? <a href="register.html" class="text-primary text-decoration-none fw-bold auth-link transition-all hover-scale">Enroll Now</a></p>
            </div>
        </div>
        
        <div class="text-center mt-4">
             <p class="tech-data text-muted" style="font-size: 0.6rem;">&copy; 2026 CORPMOVE_LOGISTICS. SYSTEM_ID: AUTH_NODE_01</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="assets/js/main.js" defer></script>
</body>
</html>
