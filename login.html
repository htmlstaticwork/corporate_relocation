<!DOCTYPE html>
<html lang="en" data-bs-theme="light" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to your CorpMove account.">
    <title>Login | CorpMove</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="assets/css/style.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1e21; /* Dark background as seen in screenshot */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 50px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        [data-bs-theme="dark"] .login-card {
            background: #1f2937;
        }
        .card-toggles {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .toggle-btn:hover {
            background: #e5e7eb;
            transform: scale(1.1);
        }
        [data-bs-theme="dark"] .toggle-btn:hover {
            background: #4b5563;
        }
        [data-bs-theme="dark"] .toggle-btn {
            background: #374151;
            color: #f9fafb;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .brand-logo i {
            font-size: 2rem;
            color: #153e34; /* Greenish tone as in screenshot */
        }
        .brand-logo span {
            font-size: 1.5rem;
            font-weight: 700;
            color: #153e34;
            margin-left: 5px;
        }
        [data-bs-theme="dark"] .brand-logo i,
        [data-bs-theme="dark"] .brand-logo span {
            color: #10b981;
        }
        .login-title {
            text-align: center;
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 5px;
            color: #111827;
        }
        [data-bs-theme="dark"] .login-title {
            color: #fff;
        }
        .login-subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #374151;
            margin-bottom: 8px;
        }
        [data-bs-theme="dark"] .form-label {
            color: #d1d5db;
        }
        .form-control {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 0.9rem;
        }
        [data-bs-theme="dark"] .form-control {
            background-color: #374151;
            border-color: #4b5563;
            color: #fff;
        }
        .form-check-label {
            font-size: 0.85rem;
            color: #6b7280;
        }
        .forgot-link:hover {
            text-decoration: underline;
            color: #1a4f43;
        }
        [data-bs-theme="dark"] .forgot-link:hover {
            color: #34d399;
        }
        .btn-signin {
            background-color: #153e34;
            color: #fff;
            font-weight: 700;
            border-radius: 30px;
            padding: 12px;
            width: 100%;
            border: none;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        .btn-signin:hover {
            background-color: #0d2922;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        [data-bs-theme="dark"] .btn-signin:hover {
            background-color: #059669;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: #9ca3af;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }
        .divider::before { margin-right: 15px; }
        .divider::after { margin-left: 15px; }
        [data-bs-theme="dark"] .divider::before,
        [data-bs-theme="dark"] .divider::after { border-color: #4b5563; }
        
        .social-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .social-btn:hover {
            background: #f9fafb;
            border-color: #153e34;
            color: #153e34;
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        [data-bs-theme="dark"] .social-btn:hover {
            background: #4b5563;
            border-color: #10b981;
            color: #10b981;
        }
        .signup-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            color: #6b7280;
        }
        .signup-link {
            color: #153e34;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .signup-link:hover {
            text-decoration: underline;
            color: #1a4f43;
        }
        [data-bs-theme="dark"] .signup-link:hover {
            color: #34d399;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Icons inside Card -->
        <div class="card-toggles">
            <button class="toggle-btn" id="themeToggle" title="Toggle Theme">
                <i class="bi bi-moon-fill" id="themeIcon"></i>
            </button>
            <button class="toggle-btn" id="rtlToggle" title="Toggle RTL" style="font-weight: 700; font-size: 0.7rem;">
                RTL
            </button>
        </div>

        <a href="index.html" class="brand-logo text-decoration-none d-block">
            <i class="bi bi-buildings-fill"></i>
            <span>CorpMove</span>
        </a>

        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Please enter your details to sign in.</p>

        <form action="dashboard.html">
            <div class="mb-3 text-start">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
            </div>
            <div class="mb-3 text-start">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn btn-signin">Sign In</button>
        </form>

        <div class="divider">Or continue with</div>

        <div class="social-btns">
            <a href="#" class="social-btn"><i class="bi bi-google"></i></a>
            <a href="#" class="social-btn"><i class="bi bi-apple"></i></a>
            <a href="#" class="social-btn"><i class="bi bi-facebook"></i></a>
        </div>

        <p class="signup-text">Don't have an account? <a href="register.html" class="signup-link">Sign up</a></p>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
